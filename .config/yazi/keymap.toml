[[mgr.prepend_keymap]]
on = ["g", "m"]
run = "cd ~/.mydotfiles/com.ml4w.dotfiles/.config"
desc = "Go ML4W Config"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/Documentos"
desc = "Go ~/Documentos/"

[[mgr.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/Descargas/"
desc = "Go ~/Descargas/"

[[mgr.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Go ~"

[[mgr.prepend_keymap]]
on = ["g", "H"]
run = "cd ~/.mydotfiles/com.ml4w.dotfiles.stable/.config/hypr/"
desc = "Go Hypr Config"

[[mgr.prepend_keymap]]
on = ["g", "."]
run = ["cd /home/abraham/MisDotfiles", "hidden toggle" ]
desc = "Go MisDotfiles"

[[mgr.prepend_keymap]]
on = ["z", "u"]
run = "shell -- ouch decompress %s"
desc = "Descomprimir archivos seleccionados"

[[mgr.prepend_keymap]]
on = ["z", "z"]
run = "shell -- ouch compress %s %h.zip"
desc = "Comprimir selección en .zip"

[[mgr.prepend_keymap]]
on = ["z", "t"]
run = "shell -- ouch compress %s %h.tar.gz"
desc = "Comprimir selección en .tar.gz"

[[mgr.prepend_keymap]]
on = ["z", "7"]
run = "shell -- ouch compress %s %h.7z"
desc = "Comprimir selección en .7z"

[[mgr.prepend_keymap]]
on = ["e", "a"]
run = "shell -- chmod +x %h"
desc = "Dar permiso de ejecución (+x)"

[[mgr.prepend_keymap]]
on = ["e", "r"]
run = "shell -- chmod -x %h"
desc = "Quitar permiso de ejecución (-x)"

[[mgr.prepend_keymap]]
on = "H"
run = "tab_switch -1 --relative"
desc = "Cambiar a la pestaña anterior"

[[mgr.prepend_keymap]]
on = "L"
run = "tab_switch 1 --relative"
desc = "Cambiar a la siguiente pestaña"

[[mgr.prepend_keymap]]
on = "i"
run = "plugin zoxide"
desc = "Buscar carpetas con Zoxide"

[[mgr.prepend_keymap]]
on = "I"
run = "plugin fzf"
desc = "Buscar archivos con fzf"

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"

# m -> Mount the partition
# u -> Unmount the partition
# e -> Eject the disk

[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Chmod on selected files"
