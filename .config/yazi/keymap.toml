[[mgr.prepend_keymap]]
on = [ "u", "b" ]
run = "plugin recycle-bin"
desc = "Open recicle bin menu"

[[mgr.prepend_keymap]]
on = [ "<C-p>" ]
run = "paste --force"
desc = "Paste yanked files (overwrite if file exists in the destinatio)"

[[mgr.prepend_keymap]]
on = [ "P", "s" ]
run = "plugin projects save"
desc = "Save current project"

[[mgr.prepend_keymap]]
on = [ "P", "L" ]
run = "plugin projects load"
desc = "Load project"

[[mgr.prepend_keymap]]
on = [ "P", "l" ]
run = "plugin projects load_last"
desc = "Load last project"

[[mgr.prepend_keymap]]
on = [ "P", "d" ]
run = "plugin projects delete"
